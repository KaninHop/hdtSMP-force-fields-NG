; HDT-SMP Force Fields configuration
; This file is auto-generated on first load if missing.
; Place in: Data/SKSE/Plugins/HDT-SMP Force Fields.ini

[General]
; Log frame-by-frame performance statistics to the log file (true/false)
bLogStatistics=false

[ForceFields]
; Global multiplier applied to all force field strengths (float)
fForceMultiplier=1.0

[Performance]
; Number of worker threads for multi-threaded force application.
; Set to 0 or 1 to disable multi-threading.
; Default: 8. Cap: 128.
iThreads=8
